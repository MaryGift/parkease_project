{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h2>Hire Out a Battery</h2>
    <hr>
    
    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <div class="card shadow-sm">
        <div class="card-body">
            <form method="POST">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label for="battery" class="form-label">Select Available Battery</label>
                    <select name="battery" id="battery" class="form-select" required>
                        <option value="">-- Choose from Inventory --</option>
                        {% for battery in batteries %}
                            <option value="{{ battery.id }}">
                                {{ battery.brand }} - {{ battery.capacity }} (UGX {{ battery.price }})
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label for="customer_name" class="form-label">Customer Name</label>
                    <input type="text" 
                           name="customer_name" 
                           id="customer_name" 
                           class="form-control" 
                           pattern="[A-Z][a-zA-Z\s]*" 
                           title="Name must start with a capital letter and contain no numbers" 
                           required>
                </div>

                <div class="mb-3">
                    <label for="customer_phone" class="form-label">Phone Number</label>
                    <input type="tel" 
                           name="customer_phone" 
                           id="customer_phone" 
                           class="form-control" 
                           placeholder="07..." 
                           required>
                </div>

                <div class="mb-3">
                    <label for="price" class="form-label">Hire Price (UGX)</label>
                    <input type="number" name="price" id="price" class="form-control" required>
                    <small class="text-muted">Price is set by the section manager [cite: 54]</small>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-primary">Confirm Hire</button>
                    <a href="{% url 'dashboard' %}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
