{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
  <h2>Record Tyre Service</h2>
  <hr />
  <div class="card shadow-sm">
    <div class="card-body">
      <form method="POST">
    {% csrf_token %}

    <div class="mb-3">
        <label class="form-label">Select Vehicle</label>
        {{ form.vehicle }} </div>

    <div class="mb-3">
        <label class="form-label">Service Type</label>
        {{ form.service_type }}
    </div>

    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">Price (UGX)</label>
            {{ form.price }}
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Attendant Name</label>
            {{ form.attendant_name }}
        </div>
    </div>

    <div class="mt-3">
        <button type="submit" class="btn btn-dark">Save Record</button>
    </div>
</form>
{% endblock content %}
