{% extends 'base.html' %}

{% block content %}
<div class="container-fluid">
    <div class="mb-4">
        <h2 class="text-dark">ParkEase Dashboard</h2>
        <p class="text-muted">Daily Overview of Parking Operations</p>
    </div>

    <div class="row">
        <div class="col-md-6 mb-4">
            <div class="card shadow-sm border-0" style="background-color: white;">
                <div class="card-body text-center p-5">
                    <h1 class="display-1 fw-bold text-dark">{{ total_parked }}</h1>
                    <h4 class="text-uppercase ls-wide">Vehicles Parked</h4>
                    <p class="text-muted small">Total vehicles registered today</p> <a href="{% url 'vehicle_list' %}" class="btn btn-outline-dark mt-3">View Details</a>
                </div>
            </div>
        </div>

        <div class="col-md-6 mb-4">
            <div class="card shadow-sm border-0" style="background-color: #212529; color: #F5F5DC;">
                <div class="card-body text-center p-5">
                    <h1 class="display-1 fw-bold">{{ total_signed_out }}</h1>
                    <h4 class="text-uppercase ls-wide">Signed Out</h4>
                    <p class="small" style="color: #a8a8a8;">Vehicles that have left the facility</p> <a href="#" class="btn btn-outline-light mt-3">View History</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
